global
    maxconn 8192
    nbthread 1
    tune.bufsize 16384
    tune.maxrewrite 1024

defaults
    mode tcp
    no log
    option dontlognull
    retries 0
    timeout connect 50ms
    timeout client 2s
    timeout server 2s
    timeout queue 2s

frontend main
    bind *:9999 backlog 4096
    maxconn 12000
    default_backend api_servers

backend api_servers
    balance roundrobin
    default-server maxconn 3000
    option http-keep-alive
    http-reuse always
    server api1 api1:8000 check maxconn 2048
    server api2 api2:8000 check maxconn 2048
