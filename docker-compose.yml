services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "50MB"

  api1:
    image: ghcr.io/macielti/guarita:main
    volumes:
      - ./resources:/app/resources
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

  api2:
    image: ghcr.io/macielti/guarita:main
    volumes:
      - ./resources:/app/resources
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"