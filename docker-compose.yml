services:
  haproxy:
    image: haproxy:alpine
    container_name: guarita_haproxy
    restart: unless-stopped
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "50MB"

  api1:
    image: ghcr.io/macielti/guarita:sha-16bf311
    container_name: guarita_api1
    restart: unless-stopped
    volumes:
      - ./resources/config.edn:/app/resources/config.edn
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

  api2:
    image: ghcr.io/macielti/guarita:sha-16bf311
    container_name: guarita_api2
    restart: unless-stopped
    volumes:
      - ./resources/config.edn:/app/resources/config.edn
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"
