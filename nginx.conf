worker_processes 1;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    sendfile on;
    tcp_nodelay on;
    tcp_nopush off;

    upstream api {
        server api1:8000;
        server api2:8000;
    }

    server {
        listen 9999;
        location / {
            proxy_pass http://api;
        }
    }
}