worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null;
    tcp_nodelay on;

    upstream api {
        server api1:8000;
        server api2:8000;
        keepalive 256;
        keepalive_requests 100000;
    }

    server {
        listen 9999 backlog=4096;
        keepalive_timeout 75s;
        keepalive_requests 100000;
        location / {
            proxy_pass http://api;
        }
    }
}
